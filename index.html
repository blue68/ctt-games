<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8efe2" />
    <meta name="description" content="视觉专注力训练 H5 小游戏：从 1 开始快速找到所有数字。" />
    <title>视觉专注力训练</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23f8efe2'/%3E%3Cpath d='M10 10h44v44H10z' fill='%23fffaf1' stroke='%23191816' stroke-width='5'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='30' font-weight='900' fill='%23191816'%3E1%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css?v=20260425-2" />
  </head>
  <body>
    <main class="app">
      <section class="hero" id="startPanel">
        <div class="brand">Focus Grid</div>
        <h1>视觉专注力训练</h1>
        <p class="subtitle">从 1 开始按顺序点击数字，越快越强。49 个关卡，难度逐级拉满。</p>
        <div class="hero-card">
          <div class="metric">
            <strong>49</strong>
            <span>训练关卡</span>
          </div>
          <div class="metric">
            <strong>1-100</strong>
            <span>数字挑战</span>
          </div>
          <div class="metric">
            <strong>3★</strong>
            <span>速度评级</span>
          </div>
        </div>
        <button class="primary-btn" id="startBtn">开始训练</button>
        <button class="ghost-btn" id="practiceBtn">轻松体验</button>
      </section>

      <section class="game is-hidden" id="gamePanel" aria-label="视觉专注力训练游戏区">
        <header class="topbar">
          <button class="icon-btn" id="backBtn" aria-label="返回首页">←</button>
          <div class="stage-title">
            <span id="levelLabel">第 1 关</span>
            <strong id="nextLabel">找 1</strong>
          </div>
          <button class="icon-btn" id="pauseBtn" aria-label="暂停游戏">Ⅱ</button>
        </header>

        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="rangeLabel">1 到 12</span>
            <span id="timerLabel">00.0s</span>
          </div>
          <div class="progress-track">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <div class="board-shell">
          <div class="board" id="board" aria-live="polite"></div>
        </div>

        <footer class="game-footer">
          <div>
            <span>连击</span>
            <strong id="comboLabel">0</strong>
          </div>
          <div>
            <span>最佳</span>
            <strong id="bestLabel">--</strong>
          </div>
          <div>
            <span>星级</span>
            <strong id="starLabel">--</strong>
          </div>
        </footer>
      </section>

      <section class="result is-hidden" id="resultPanel" aria-live="assertive">
        <div class="result-card">
          <span class="result-kicker" id="resultKicker">闯关成功</span>
          <h2 id="resultTitle">第 1 关完成</h2>
          <p id="resultText">用时 0.0 秒</p>
          <div class="result-stats">
            <div>
              <strong id="resultStars">★★★</strong>
              <span>本关评级</span>
            </div>
            <div>
              <strong id="resultRank">专注新星</strong>
              <span>称号</span>
            </div>
          </div>
          <blockquote class="quote-card" id="quoteCard">
            <span id="quoteType">励志格言</span>
            <p id="quoteText">把注意力放回当下，速度自然会出现。</p>
          </blockquote>
          <div class="actions">
            <button class="primary-btn" id="nextBtn">下一关</button>
            <button class="ghost-btn" id="replayBtn">再玩一次</button>
            <button class="ghost-btn" id="shareBtn">生成分享语</button>
            <button class="ghost-btn" id="posterBtn">生成分享海报</button>
          </div>
          <p class="share-copy is-hidden" id="shareCopy"></p>
          <div class="poster-wrap is-hidden" id="posterWrap">
            <img id="posterImg" alt="视觉专注力训练成绩分享海报" />
            <p>长按海报保存图片，发朋友圈邀请好友挑战。</p>
            <button class="ghost-btn" id="systemShareBtn">系统分享</button>
          </div>
        </div>
      </section>

      <section class="pause is-hidden" id="pausePanel">
        <div class="modal">
          <h2>训练暂停</h2>
          <p>保持简单：继续后从当前数字接着找。</p>
          <button class="primary-btn" id="resumeBtn">继续</button>
          <button class="ghost-btn" id="restartBtn">重开本关</button>
        </div>
      </section>
    </main>

    <script src="./game.js?v=20260425-2"></script>
  </body>
</html>
